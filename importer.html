<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Street Flags · Importador Maestro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0f;--s1:#16161a;--s2:#1e1e24;--b:#222;--b2:#2a2a32;--t:#e8e8ec;--sub:#666;--m:#00d4ff;--g:#00e5a0;--r:#ff5050;--y:#ffb420;--py:#ff3fa4;--mono:'SF Mono',monospace}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding:32px 20px}
.wrap{max-width:920px;margin:0 auto}
h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.3px}
.subtitle{font-size:13px;color:var(--sub);margin-top:4px;margin-bottom:24px}
.tabs{display:flex;gap:10px;margin-bottom:24px;border-bottom:1px solid var(--b);padding-bottom:16px;flex-wrap:wrap}
.tab{padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;border:1px solid transparent;background:transparent;color:var(--sub);transition:all .2s}
.tab.on.tot{background:rgba(0,212,255,.1);border-color:var(--m);color:var(--m)}
.tab.on.py{background:rgba(255,63,164,.1);border-color:var(--py);color:var(--py)}
.tab.on.ita{background:rgba(255,180,32,.1);border-color:var(--y);color:var(--y)}
.tab:hover:not(.on){color:var(--t);background:var(--s2)}
.card{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:24px;margin-bottom:18px;transition:opacity .2s}
.card.off{opacity:.35;pointer-events:none}
.card-hd{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--sub);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.num{width:20px;height:20px;border-radius:50%;background:var(--s2);border:1px solid var(--b2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--sub);flex-shrink:0}
.num.on{background:rgba(0,212,255,.15);border-color:var(--m);color:var(--m)}
.mode-py .num.on{background:rgba(255,63,164,.15);border-color:var(--py);color:var(--py)}
.mode-ita .num.on{background:rgba(255,180,32,.15);border-color:var(--y);color:var(--y)}
.drop{border:2px dashed var(--b2);border-radius:10px;padding:44px 20px;text-align:center;cursor:pointer;transition:all .2s}
.drop:hover,.drop.over{border-color:var(--m);background:rgba(0,212,255,.03)}
.mode-py .drop:hover,.mode-py .drop.over{border-color:var(--py);background:rgba(255,63,164,.03)}
.mode-ita .drop:hover,.mode-ita .drop.over{border-color:var(--y);background:rgba(255,180,32,.03)}
.drop p{color:var(--sub);font-size:13px;line-height:1.9}
.drop strong{color:#bbb}
#fi{display:none}
.finfo{margin-top:12px;font-size:12px;color:var(--sub);display:none}
.row3{display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:end}
label{font-size:11px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
select{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:9px 12px;color:var(--t);font-size:13px;width:100%;outline:none}
select:focus{border-color:var(--m)}
.log{background:#07070a;border:1px solid var(--b);border-radius:8px;padding:12px 14px;font-family:var(--mono);font-size:11px;line-height:1.9;max-height:220px;overflow-y:auto;white-space:pre-wrap}
.ok{color:var(--g)}.warn{color:var(--y)}.err{color:var(--r)}.info{color:var(--m)}.dim{color:#2a2a36}
.tbl-w{overflow-x:auto;margin-top:16px;border-radius:8px;border:1px solid var(--b)}
table{border-collapse:collapse;font-size:11px;width:100%}
th{background:var(--s2);padding:8px 12px;font-weight:700;color:var(--sub);border-bottom:1px solid var(--b);white-space:nowrap;text-align:right}
th:first-child{text-align:left}
td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);color:#aaa;text-align:right;white-space:nowrap}
td:first-child{text-align:left;color:var(--t);font-weight:600}
tr.total td{border-bottom:none;font-weight:700;color:var(--t);background:rgba(255,255,255,.025)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--m);color:#000}.btn-p:hover{background:#33ddff}
.btn-p:disabled{background:#1a3a40;color:#2a6070;cursor:not-allowed}
.out{background:#06060a;border:1px solid var(--b);border-radius:8px;padding:14px;font-family:var(--mono);font-size:10.5px;color:#444;line-height:1.7;max-height:260px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.acts{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
</style>
</head>
<body id="body-wrap">
<div class="wrap">
<h1>Street Flags · Importador Maestro</h1>
<p class="subtitle" id="main-sub">Generador de bloques JS para mantener tu dashboard al día.</p>

<div class="tabs">
  <button class="tab on tot" id="tab-tot" onclick="setMode('tot')">📊 Toteat (Ventas Totales)</button>
  <button class="tab py" id="tab-py" onclick="setMode('py')">🛵 PedidosYa (Delivery)</button>
  <button class="tab ita" id="tab-ita" onclick="setMode('ita')">🏦 Banco Itaú (Flujo de Caja)</button>
</div>

<div class="card" id="c1">
  <div class="card-hd"><span class="num on">1</span>Cargar archivo(s)</div>
  <div class="drop" id="drop" onclick="document.getElementById('fi').click()">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="opacity:.22;margin-bottom:12px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="3"/></svg>
    <p><strong>Click aquí</strong> o arrastra los archivos</p>
    <p style="font-size:11px;margin-top:6px" id="drop-hint">Toteat → Reportes → Cuadro de Venta → Exportar XLS</p>
  </div>
  <input type="file" id="fi" accept=".xls,.xlsx,.html,.htm,.csv,.txt" multiple>
  <div class="finfo" id="finfo"></div>
</div>

<div class="card off" id="c2">
  <div class="card-hd"><span class="num" id="n2">2</span>Configuración Toteat</div>
  <div class="row3">
    <div>
      <label>Año de inicio del archivo</label>
      <select id="sy"><option value="2024">2024</option><option value="2025" selected>2025</option><option value="2026">2026</option></select>
    </div>
    <div>
      <label>Mes de inicio</label>
      <select id="sm">
        <option value="0" selected>Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
        <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
        <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
        <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
      </select>
    </div>
    <button class="btn btn-p" id="btngo" disabled onclick="runTot()">Procesar XLS</button>
  </div>
</div>

<div class="card off" id="c3">
  <div class="card-hd"><span class="num" id="n3">3</span>Resultados</div>
  <div class="log" id="logel"></div>
  <div class="tbl-w" id="tbl-w"><table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
</div>

<div class="card off" id="c4">
  <div class="card-hd"><span class="num" id="n4">4</span>Exportar a data.js</div>
  <p style="font-size:12px;color:var(--sub);margin-bottom:12px" id="out-hint"></p>
  <div class="out" id="outel"></div>
  <div class="acts">
    <button class="btn btn-p" onclick="doCopy()"><span id="clbl">Copiar código</span></button>
  </div>
</div>
</div>

<script>
var mode = 'tot';
var loadedFiles = [];
var fileText = ''; 
var MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function setMode(m) {
  mode = m;
  document.getElementById('body-wrap').className = m === 'py' ? 'mode-py' : (m === 'ita' ? 'mode-ita' : '');
  document.getElementById('tab-tot').className = 'tab tot' + (m==='tot'?' on':'');
  document.getElementById('tab-py').className = 'tab py' + (m==='py'?' on':'');
  document.getElementById('tab-ita').className = 'tab ita' + (m==='ita'?' on':'');
  document.getElementById('c2').style.display = m==='tot' ? 'block' : 'none';
  
  if(m==='tot') document.getElementById('drop-hint').innerHTML = 'Toteat → Reportes → Cuadro de Venta → Exportar XLS';
  else if(m==='py') document.getElementById('drop-hint').innerHTML = '<span style="color:var(--py)">Arrastra aquí tus archivos CSV de PedidosYa todos juntos.</span><br>ordersPerMonth, heatmap, y popularDishes.';
  else if(m==='ita') document.getElementById('drop-hint').innerHTML = '<span style="color:var(--y)">Arrastra tu Cartola Histórica de Banco Itaú en formato CSV.</span>';
  
  loadedFiles = []; fileText = '';
  document.getElementById('finfo').style.display = 'none';
  document.getElementById('c3').classList.add('off');
  document.getElementById('c4').classList.add('off');
  document.getElementById('btngo').disabled = true;
}

function load(files) {
  if(!files.length) return;
  var fi = document.getElementById('finfo');
  fi.style.display = 'block'; 
  fi.innerHTML = '<span style="color:#00e5a0">✓</span> <strong>' + files.length + ' archivo(s) cargado(s)</strong>';
  
  if (mode === 'tot') {
    var r = new FileReader();
    r.onload = function(e) { fileText = e.target.result; on('c2', 'n2'); document.getElementById('btngo').disabled = false; };
    r.readAsText(files[0], 'utf-8');
  } else if (mode === 'py') {
    loadedFiles = Array.from(files); on('c3', 'n3'); runPY();
  } else if (mode === 'ita') {
    loadedFiles = Array.from(files); on('c3', 'n3'); runIta();
  }
}

var dropEl=document.getElementById('drop');
dropEl.addEventListener('dragover',function(e){e.preventDefault();dropEl.classList.add('over');});
dropEl.addEventListener('dragleave',function(){dropEl.classList.remove('over');});
dropEl.addEventListener('drop',function(e){e.preventDefault();dropEl.classList.remove('over');if(e.dataTransfer.files.length) load(e.dataTransfer.files);});
document.getElementById('fi').addEventListener('change',function(e){if(e.target.files.length) load(e.target.files);});

function on(cid,nid){ document.getElementById(cid).classList.remove('off'); if(nid) document.getElementById(nid).classList.add('on'); }
function lg(msg,cls){ var el=document.getElementById('logel'); var s=document.createElement('span'); s.className=cls||'dim'; s.textContent=msg+'\n'; el.appendChild(s); el.scrollTop=el.scrollHeight; }
function f(n){return '$'+(n/1e6).toFixed(2)+'M';}
function fmt(n){return '$'+n.toLocaleString('es-CL');}
function pn(s){var v=parseFloat(String(s).replace(/\$/g,'').replace(/%/g,'').replace(/\./g,'').replace(',','.')); return isNaN(v)?0:v;}

function parseTable(html){
  var doc=new DOMParser().parseFromString(html,'text/html');
  var rows=[];
  doc.querySelectorAll('tr').forEach(function(tr){
    var cells=[]; tr.querySelectorAll('td,th').forEach(function(td){cells.push(td.textContent.trim());});
    if(cells.some(function(c){return c.trim();})) rows.push(cells);
  });
  return rows;
}
function parseCSVLine(text) {
  let ret = [], val = '', inQ = false;
  for(let i=0; i<text.length; i++) {
    let c = text[i];
    if(c === '"') inQ = !inQ;
    else if(c === ',' && !inQ) { ret.push(val); val=''; }
    else val += c;
  }
  ret.push(val); return ret;
}

// ─── PROCESADOR TOTEAT (CON CAPTURA DE EFECTIVO) ───
function runTot() {
  const file = document.getElementById('fot').files[0];
  if(!file) return alert('Sube el archivo de Toteat');

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const rows = [];
    
    // 1. Convertir el archivo (HTML o CSV) en una matriz de celdas
    if(text.includes('<tr')) {
      const doc = new DOMParser().parseFromString(text, 'text/html');
      doc.querySelectorAll('tr').forEach(tr => {
        rows.push([...tr.querySelectorAll('td,th')].map(td => td.textContent.trim()));
      });
    } else {
      const delimiter = text.includes('\t') ? '\t' : (text.includes(';') ? ';' : ',');
      text.split(/\r?\n/).forEach(l => { if(l) rows.push(l.split(delimiter).map(c => c.replace(/^"|"$/g,'').trim())); });
    }

    // 2. Identificar filas clave
    const rowVenta = rows.find(r => r[0] === 'Venta Neta');
    const rowEfectivo = rows.find(r => r[0] === 'Efectivo');
    const headers = rows[0]; // Los días están aquí

    if(!rowVenta || !rowEfectivo) return alert('No se encontró la fila "Venta Neta" o "Efectivo".');

    // 3. Procesar columnas y agrupar por mes
    const parsed = {};
    const mNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    
    // Año inicial según tu archivo
    let currentYear = 2025; 
    let lastMonthIdx = 0; // Partimos en Enero

    for(let i = 1; i < headers.length; i++) {
      let diaLabel = headers[i].toLowerCase();
      if(!diaLabel || diaLabel === 'total') continue;

      // Detectar cambio de mes (cuando el número del día vuelve a ser 1)
      let dayNum = parseInt(diaLabel.split(' ').pop());
      if(dayNum === 1 && i > 1) {
        lastMonthIdx++;
        if(lastMonthIdx > 11) { lastMonthIdx = 0; currentYear++; }
      }

      let monthName = `${mNames[lastMonthIdx]} ${currentYear}`;
      if(!parsed[monthName]) {
        parsed[monthName] = { month: monthName, venta_neta: 0, efectivo: 0, days_active: 0 };
      }

      // Limpiar y sumar valores
      let vVal = parseFloat(rowVenta[i].replace(/[^0-9,-]/g,'').replace(',','.')) || 0;
      let eVal = parseFloat(rowEfectivo[i].replace(/[^0-9,-]/g,'').replace(',','.')) || 0;

      if(vVal !== 0) {
        parsed[monthName].venta_neta += Math.round(vVal);
        parsed[monthName].efectivo += Math.round(eVal);
        parsed[monthName].days_active++;
      }
    }

    // 4. Guardar y mostrar éxito
    const finalData = { monthly: Object.values(parsed), daily: [] };
    localStorage.setItem('app_sales', JSON.stringify(finalData));
    
    document.getElementById('outel').textContent = '✅ Efectivo y Ventas capturados con éxito desde Enero 2025.';
    document.getElementById('out-hint').innerHTML = 'Ya puedes cerrar esta ventana y volver a tu App. El efectivo ya se cruzó.';
    on('c4','n4');
  };
  reader.readAsText(file, 'UTF-8');
}

// ─── PROCESADOR PEDIDOS YA ───
function parsePYAmount(str) { return parseInt(str.replace(/["\.]/g, '').split(',')[0]) || 0; }
async function runPY() {
  document.getElementById('logel').innerHTML=''; document.getElementById('tbl-w').style.display='none'; 
  let results = { dm: [], hm: [], d6: [], dr: [] };
  lg('Procesando archivos de PedidosYa...', 'info');
  for(let f of loadedFiles) {
    let text = await f.text(); let lines = text.split(/\r?\n/).filter(x => x.trim()); if(!lines.length) continue;
    let header = lines[0].toLowerCase();
    if (header.includes('rechazados')) {
       results.dm = lines.slice(1).map(l => { let p = parseCSVLine(l); return p.length<4 ? null : { mes: p[0], pedidos: parseInt(p[1])||0, rechazados: parseInt(p[2])||0, ventas: parsePYAmount(p[3]) };}).filter(x => x);
       lg('✓ Leído: Reporte mensual (' + results.dm.length + ' meses detectados)', 'ok');
    } else if (header.includes('hora') && header.includes('ingresos')) {
       results.hm = lines.slice(1).map(l => { let p = parseCSVLine(l); return p.length<3 ? null : { hora: parseInt(p[0])||0, pedidos: parseInt(p[1])||0, ingresos: parsePYAmount(p[2]) };}).filter(x => x);
       lg('✓ Leído: Mapa de calor horario (' + results.hm.length + ' horas)', 'ok');
    } else if (header.includes('producto') && header.includes('total')) {
       let data = lines.slice(1).map(l => { let p = parseCSVLine(l); return p.length<5 ? null : { name: p[0], qty: parseInt(p[3])||0, venta: parsePYAmount(p[4]) };}).filter(x => x);
       if(data.reduce((s,x)=>s+x.qty,0) > 1000) { results.d6 = data; lg('✓ Leído: Ranking Platos Histórico', 'ok'); }
       else { results.dr = data; lg('✓ Leído: Ranking Platos Reciente', 'ok'); }
    }
  }
  let outText = '';
  if(results.dm.length) outText += 'const DELIVERY_MONTHLY=' + JSON.stringify(results.dm) + ';\n\n';
  if(results.hm.length) outText += 'const HEATMAP=' + JSON.stringify(results.hm) + ';\n\n';
  if(results.d6.length) outText += 'const DISHES_6M=' + JSON.stringify(results.d6) + ';\n\n';
  if(results.dr.length) outText += 'const DISHES_RECENT=' + JSON.stringify(results.dr) + ';\n';
  if(!outText) { lg('❌ No se generó información. ¿Subiste los CSV correctos?', 'err'); return; }
  document.getElementById('outel').textContent = outText;
  document.getElementById('out-hint').innerHTML = 'Copia esto y reemplaza <strong>los 4 bloques</strong> de delivery en data.js:';
  on('c4', 'n4');
}

// ─── PROCESADOR BANCO ITAU ───
function parseItaAmount(str) { return parseInt(str.replace(/[^0-9]/g, '')) || 0; }
async function runIta() {
  document.getElementById('logel').innerHTML=''; document.getElementById('tbl-w').style.display='block'; 
  let allTx = []; lg('Procesando cartolas de Itaú...', 'info');
  for(let fi of loadedFiles) {
    let text = await fi.text(); let lines = text.split(/\r?\n/).filter(x => x.trim());
    let year = new Date().getFullYear();
    let pMatch = text.match(/Período.*?(\d{4})/i); if(pMatch) year = pMatch[1];
    let txs = [];
    lines.forEach(l => {
      let p = parseCSVLine(l); if(p.length < 6) return;
      let dateStr = p[0].trim();
      if(/^\d{2}\/\d{2}$/.test(dateStr)) {
        let pts = dateStr.split('/'); let isoDate = year + '-' + pts[1] + '-' + pts[0];
        let abono = parseItaAmount(p[4]); let cargo = parseItaAmount(p[5]);
        if(abono > 0 || cargo > 0) txs.push({ date: isoDate, desc: p[3].trim(), in: abono, out: cargo });
      }
    });
    if(txs.length) { lg('✓ ' + txs.length + ' movimientos extraídos ('+year+').', 'ok'); allTx = allTx.concat(txs); }
  }
  if(!allTx.length) { lg('❌ No hay datos válidos.', 'err'); return; }
  allTx.sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('thead').innerHTML='<tr><th>Fecha</th><th style="text-align:left">Descripción</th><th>Abono (+)</th><th>Cargo (-)</th></tr>';
  document.getElementById('tbody').innerHTML=allTx.slice(0,30).map(function(t){
    return '<tr><td>'+t.date+'</td><td style="text-align:left;color:var(--t)">'+t.desc+'</td><td style="color:#00e5a0">'+(t.in>0?fmt(t.in):'-')+'</td><td style="color:#ff5050">'+(t.out>0?fmt(t.out):'-')+'</td></tr>';
  }).join('') + (allTx.length>30?'<tr><td colspan="4" style="text-align:center;color:var(--sub);padding:15px">... y '+ (allTx.length-30) +' movimientos más ocultos ...</td></tr>':'');
  
  document.getElementById('outel').textContent='const BANK_TX=' + JSON.stringify(allTx) + ';';
  document.getElementById('out-hint').innerHTML='Copia este bloque y pégalo <strong>al final de tu archivo <code>data.js</code></strong> (es un bloque nuevo):';
  on('c4', 'n4');
}

function doCopy(){
  var t=document.getElementById('outel').textContent;
  (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(ok).catch(function(){
    var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();
  });
  function ok(){ document.getElementById('clbl').textContent='¡Copiado con éxito!'; setTimeout(function(){document.getElementById('clbl').textContent='Copiar código';},2200); }
}
</script>
</body>
</html>
